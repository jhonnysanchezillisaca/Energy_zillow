version: '3.8'

services:
  api:
    build: .
    container_name: energy-zillow-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - energy-zillow
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: energy-zillow-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    networks:
      - energy-zillow
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  energy-zillow:
    driver: bridge
